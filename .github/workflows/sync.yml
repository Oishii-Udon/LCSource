name: Sync Apps

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python sync.py

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "auto sync" || echo "no changes"
          git push